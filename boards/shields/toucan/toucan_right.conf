CONFIG_ZMK_POINTING=y

# The pinnacle driver also requires this to include sleep code
CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_BATTERY_REPORTING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Match the left half: don't let the radio skip connection events. The trackpad
# lives on this (peripheral) half, so its latency to the central directly affects
# how fast the pointer wakes. See toucan_left.conf for the full rationale.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

# Boost BLE TX power to +8 dBm on this half too -- strengthens BOTH the split link
# (right -> central, carries the trackpad) and helps overall RF robustness.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Match the left half / PocketCorne: request improved connection parameters for
# a more stable, responsive BLE link. See toucan_left.conf for rationale.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Required to include the touchpad autosleep code.  This saves *lots* of power during use
# but IMO the user experience feels not so great because quite often when you go to use the touchpad
# you need to wait ~300ms for it to wake up.  So for now I'm leaving it off.  I think with just my 
# shutdown mode power savings are probably adequate
# CONFIG_ZMK_INPUT_PINNACLE_IDLE_SLEEPER=y

# Enter deep sleep https://zmk.dev/docs/features/low-power-states
CONFIG_ZMK_SLEEP=y

# Defaults to 15 minutes but 60 minutes is only very slightly more power draw and user experience is much better to not
# have keyboard go to deep sleep (i.e. having to reconenect to bluetooth)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# 'Regular' ZMK idle behavior (default 30000). At this timeout the cirque is
# PM-shut-down (1.7mA idle vs 2.9mA active), so this is the main lever for the
# right half's higher power draw -- shorter timeout = pad sleeps sooner. Dropped
# 30s -> 10s now that waking is smooth (host-side BLE conn-interval fix removed
# the post-wake buffering; only the ~300ms wake remains, suppressed if a key was
# pressed within the timeout). Tune this single number for power vs how often you
# hit the wake: 5000 = aggressive, 15000 = gentler.
CONFIG_ZMK_IDLE_TIMEOUT=10000

# We use this because we need ZMK_PM, PM_DEVICE and ZMK_PM_DEVICE_SUSPEND_RESUME to get proper sleep notifications into the cirque driver
# since we need all that might as well also turn on SOFT_OFF (which implies all these things but adds an optional SOFT_OFF feature)
CONFIG_ZMK_PM_SOFT_OFF=y
