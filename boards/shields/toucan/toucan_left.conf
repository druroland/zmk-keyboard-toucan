CONFIG_ZMK_POINTING=y

# The pinnacle driver also requires this to include sleep code
CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Slave latency: how many connection events the radio may skip when it has
# nothing to send. ZMK default 30 (~30*~8ms = ~260ms) caused a visible ~1/2s
# pointer-wake lag. We ran 0 (respond every interval) for max snappiness, but
# that keeps the radio hot every interval = the bulk of the ~1.7mA idle draw.
# Revisited to 5: only the FIRST event after a quiet gap is delayed (~5 * ~8.75ms
# host interval = ~44ms, imperceptible for keys, marginal for the pointer), while
# the radio sleeps through the many short idle gaps -> meaningfully lower average
# power. Well under the BLE supervision window, so no disconnect risk. If the
# pointer feels sticky on re-touch after a pause, drop back toward 0.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=5

# Boost BLE transmit power 0 -> +8 dBm (nRF52840 max). Disconnects were RF link
# failures (HCI reason 0x08 Connection Timeout / 0x3e Failed-to-Establish), i.e.
# the host losing the radio -- consistent with 2.4GHz interference (USB3 hubs) and
# the XIAO's small onboard antenna. +8 dBm (~6x power) widens the link margin.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Experimental connection handling: ZMK requests better/updated connection
# parameters from the host for a more responsive, stable link. The PocketCorne
# (nice!nano) runs with this and is smooth; the XIAO Toucan was missing it and
# still buffered/repeated (dropped key-releases). Worth a shot before blaming
# the XIAO's antenna outright.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enter deep sleep https://zmk.dev/docs/features/low-power-states
CONFIG_ZMK_SLEEP=y

# Deep sleep timeout 60min -> 20min (matches right half). Deep sleep is ~20x
# lower draw than idle (~tens of uA vs ~1.7mA) at the cost of a BLE reconnect on
# wake; sleeping after ~20min of no use is the biggest standby-battery win on the
# 180mAh cells. This also gates the nice_view_gem SLEEP screen (shown only on
# ZMK_ACTIVITY_SLEEP), so the sleep robot now appears after 20min, not 60.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000

# 'Regular' ZMK idle behavior (default 30000). Match the right half: 30s -> 10s.
# The left (central) drives the shared idle state, so it must match the right for
# the cirque to actually shut down on schedule. Shorter = pad sleeps sooner =
# less right-half power; waking is smooth now (see right conf for the full note).
CONFIG_ZMK_IDLE_TIMEOUT=10000

# We use this because we need ZMK_PM, PM_DEVICE and ZMK_PM_DEVICE_SUSPEND_RESUME to get proper sleep notifications into the cirque driver
# since we need all that might as well also turn on SOFT_OFF (which implies all these things but adds an optional SOFT_OFF feature)
CONFIG_ZMK_PM_SOFT_OFF=y
